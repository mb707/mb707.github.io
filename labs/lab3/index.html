<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sign Up Page</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- local CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <main class="container my-5">
    <section class="signup-card mx-auto">
      <header class="text-center mb-4">
        <h1>Create an Account</h1>
        <p class="text-muted">
          Complete the form below to create your account.
        </p>
      </header>

      <form id="signupForm" action="welcome.html" method="get">

        <!-- Frist Name -->
        <div class="mb-3">
          <label for="fName" class="form-label">First Name</label>
          <input
            type="text"
            id="fName"
            name="fName"
            class="form-control"
          >
        </div>

        <!-- Last Name -->
        <div class="mb-3">
          <label for="lName" class="form-label">Last Name</label>
          <input
            type="text"
            id="lName"
            name="lName"
            class="form-control"
          >
        </div>

        <!-- Gender -->
        <fieldset class="mb-3">
          <legend class="form-label fs-6">Gender</legend>

          <div class="form-check form-check-inline">
            <input
              type="radio"
              id="genderMale"
              name="gender"
              value="m"
              class="form-check-input"
            >
            <label for="genderMale" class="form-check-label">Male</label>
          </div>

          <div class="form-check form-check-inline">
            <input
              type="radio"
              id="genderFemale"
              name="gender"
              value="f"
              class="form-check-input"
            >
            <label for="genderFemale" class="form-check-label">Female</label>
          </div>
        </fieldset>

        <!-- ZIP Coed -->
        <div class="mb-3">
          <label for="zip" class="form-label">ZIP Code</label>

          <input
            type="text"
            id="zip"
            name="zip"
            class="form-control"
            maxlength="5"
          >

          <span id="zipError" class="validation-message"></span>
        </div>

        <!-- Location Information -->
        <div class="location-box mb-4">
          <p>
            <strong>City:</strong>
            <span id="city"></span>
          </p>

          <p>
            <strong>Latitude:</strong>
            <span id="latitude"></span>
          </p>

          <p>
            <strong>Longitude:</strong>
            <span id="longitude"></span>
          </p>
        </div>

        <!-- State -->
        <div class="mb-3">
          <label for="state" class="form-label">State</label>

          <select id="state" name="state" class="form-select">
            <option value="">Loading states...</option>
          </select>
        </div>

        <!-- County -->
        <div class="mb-3">
          <label for="county" class="form-label">County</label>

          <select id="county" name="county" class="form-select">
            <option value="">Select a state first</option>
          </select>
        </div>

        <!-- Username -->
        <div class="mb-3">
          <label for="username" class="form-label">
            Desired Username
          </label>

          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
          >

          <span id="usernameError" class="validation-message"></span>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>

          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
          >

          <div id="suggestedPassword" class="suggested-password"></div>
        </div>

        <!-- Retype Password -->
        <div class="mb-3">
          <label for="passwordAgain" class="form-label">
            Retype Password
          </label>

          <input
            type="password"
            id="passwordAgain"
            name="passwordAgain"
            class="form-control"
          >

          <span id="passwordError" class="validation-message"></span>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary w-100">
          Sign Up
        </button>
      </form>
    </section>
  </main>

  <footer class="text-center py-3">
    <p>&copy; 2026 Morgan Beebe | CST 336 Internet Programming</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
